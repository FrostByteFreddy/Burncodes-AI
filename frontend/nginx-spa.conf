# SPA config: all unknown routes fall back to index.html for Vue Router
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → index.html (Vue Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
