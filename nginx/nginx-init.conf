# Temporary HTTP-only nginx config used ONLY during the initial Let's Encrypt
# certificate issuance. The deploy script swaps this out for nginx.conf after
# certs are obtained.

server {
    listen 80;
    server_name ai.burn.codes;

    # Serve ACME challenge files for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Burncodes AI - Initializing SSL...';
        add_header Content-Type text/plain;
    }
}
