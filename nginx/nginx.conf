# HTTP — redirect all traffic to HTTPS, except for ACME cert challenges
server {
    listen 80;
    server_name ai.burn.codes;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main site
server {
    listen 443 ssl;
    server_name ai.burn.codes;

    ssl_certificate     /etc/letsencrypt/live/ai.burn.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.burn.codes/privkey.pem;

    # Modern SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Increase timeouts for long-running AI/crawl requests
    proxy_connect_timeout   60s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;

    # Backend API
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads
        client_max_body_size 100M;
    }

    # Frontend (static files via frontend container)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
