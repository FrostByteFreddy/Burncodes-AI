version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: services/api/Dockerfile
    command: gunicorn --workers 8 --bind 0.0.0.0:5000 --timeout 120 "app:create_app()"
    restart: always
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis

  celery_worker_fast:
    build:
      context: ./backend
      dockerfile: services/worker_fast/Dockerfile
    restart: always
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_worker", "inspect", "ping", "-d", "fast@$$HOSTNAME", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_worker_heavy:
    build:
      context: ./backend
      dockerfile: services/worker_heavy/Dockerfile
    restart: always
    shm_size: '2gb'
    stop_grace_period: 60s
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_worker", "inspect", "ping", "-d", "heavy@$$HOSTNAME", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery_worker_chat:
    build:
      context: ./backend
      dockerfile: services/worker_chat/Dockerfile
    restart: always
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_worker", "inspect", "ping", "-d", "chat@$$HOSTNAME", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: ./backend
      dockerfile: services/beat/Dockerfile
    restart: always
    volumes:
      - app_data:/app/data
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "sh", "-c", "celery -A celery_beat beat --help > /dev/null 2>&1"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://ai.burn.codes/api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ENVIRONMENT: production
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  app_data:
  uploads:
