version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn --workers 8 --bind 0.0.0.0:5000 --timeout 120 "app:create_app()"
    restart: always
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=12
    restart: always
    volumes:
      - app_data:/app/data
      - uploads:/app/data/uploads
    env_file:
      - .env
    depends_on:
      - redis
      - backend

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery beat --loglevel=info
    restart: always
    volumes:
      - app_data:/app/data
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://ai.burn.codes/api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ENVIRONMENT: production
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  app_data:
  uploads:
